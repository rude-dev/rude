name: Benchmark PR

on:
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: Benchmark PR
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.12"
      - uses: bencherdev/bencher@fa25a72c516046b4c0e31659bef70c5266b0f94d # v0.6.2

      - name: Build extension
        run: |
          uv sync --all-packages --group bench
          uv run maturin develop --release

      - name: Download benchmark corpus
        run: uv run python benches/corpus/download.py large

      # ── Rust benchmarks (Criterion) ──────────────────────────────
      - name: Compare Rust benchmarks
        run: |
          bencher run \
            --project rude \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --branch '${{ github.ref_name }}' \
            --start-point main \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --adapter rust_criterion \
            --err \
            "cargo bench --bench analyzer --bench grouping"
        env:
          PYO3_BUILD_EXTENSION_MODULE: "1"

      # ── Python benchmarks (pytest-benchmark) ─────────────────────
      - name: Compare Python benchmarks
        run: |
          bencher run \
            --project rude \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --branch '${{ github.ref_name }}' \
            --start-point main \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --adapter python_pytest \
            --file output.json \
            --err \
            "uv run pytest benches/python/ -o 'python_files=bench_*.py' --benchmark-only --benchmark-json=output.json -q"
